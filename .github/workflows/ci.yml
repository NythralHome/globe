name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test and Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: swift test --package-path app

      - name: Build app bundle
        run: app/Scripts/build-app-bundle.sh
